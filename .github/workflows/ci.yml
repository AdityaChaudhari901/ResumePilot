name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: Backend
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_PYTHON_VERSION_WARNING: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: |
            Backend/pyproject.toml
            Backend/requirements/py312-dev-ai.constraints.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --require-hashes -r requirements/py312-build.lock.txt
          python -m pip install -e ".[dev]" -c requirements/py312-dev-ai.constraints.txt
          python -m pip check
          python --version

      - name: Check backend formatting
        run: ruff format app tests scripts migrations --check

      - name: Audit hash-locked production dependencies
        run: |
          python -m venv .audit-venv
          .audit-venv/bin/python -m pip install pip-audit==2.10.1
          .audit-venv/bin/pip-audit -r requirements/py312-production.lock.txt --progress-spinner=off

      - name: Lint backend
        run: ruff check .

      - name: Run backend tests
        run: pytest

      - name: Compile backend modules
        run: python -m compileall app tests scripts

      - name: Run golden evals
        run: python scripts/run_golden_evals.py

      - name: Run deterministic backend quality gate
        run: python scripts/run_backend_quality_gate.py

      - name: Upload backend quality gate artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: backend-quality-gate
          path: Backend/evals/outputs/backend_quality_gate.json
          if-no-files-found: ignore
          retention-days: 14

  postgres-migrations:
    name: PostgreSQL 16 migration gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: resumepilot
          POSTGRES_PASSWORD: resumepilot-ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U resumepilot -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: Backend
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_PYTHON_VERSION_WARNING: "1"
      POSTGRES_ADMIN_URL: postgresql+psycopg://resumepilot:resumepilot-ci@127.0.0.1:5432/postgres
      DATABASE_URL: postgresql+psycopg://resumepilot:resumepilot-ci@127.0.0.1:5432/resumepilot_ci_fresh
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: |
            Backend/pyproject.toml
            Backend/requirements/py312-dev-ai.constraints.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --require-hashes -r requirements/py312-build.lock.txt
          python -m pip install -e ".[dev]" -c requirements/py312-dev-ai.constraints.txt
          python -m pip check

      - name: Run fresh and prior-release PostgreSQL migrations
        run: python scripts/run_postgres_migration_gate.py

      - name: Smoke production migration readiness
        env:
          APP_ENV: production
          APP_DEBUG: "false"
          AUTO_CREATE_DB_SCHEMA: "false"
          REQUIRE_DB_MIGRATIONS: "true"
          AUTH_REQUIRED: "true"
          AUTH_TRUSTED_PROXY_SECRET: ci-trusted-proxy-secret-with-32-characters
          JOBCOPILOT_API_TOKEN: ci-openclaw-token-with-at-least-32-characters
          RESUMEPILOT_DATA_DIR: ${{ runner.temp }}/resumepilot-postgres-ready
        run: |
          log_file="${RUNNER_TEMP}/resumepilot-ready.log"
          response_file="${RUNNER_TEMP}/resumepilot-ready.json"
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8090 >"${log_file}" 2>&1 &
          api_pid=$!
          cleanup() {
            kill "${api_pid}" 2>/dev/null || true
            wait "${api_pid}" 2>/dev/null || true
          }
          trap cleanup EXIT

          ready=false
          for _attempt in $(seq 1 30); do
            if curl --fail --silent --show-error \
              http://127.0.0.1:8090/ready --output "${response_file}"; then
              ready=true
              break
            fi
            sleep 1
          done
          if [ "${ready}" != "true" ]; then
            cat "${log_file}"
            exit 1
          fi
          python - "${response_file}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as response_file:
              payload = json.load(response_file)
          assert payload["status"] == "ok", payload
          checks = {check["name"]: check["status"] for check in payload["checks"]}
          assert checks == {"database": "ok", "migrations": "ok"}, payload
          PY

  frontend:
    name: Frontend quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: Frontend
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend dependencies
        run: npm run security:audit

      - name: Lint frontend
        run: npm run lint

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Test frontend auth runtime config
        run: npm run test:auth-runtime

      - name: Build frontend
        run: npm run build

  browser:
    name: Browser and accessibility gate
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    timeout-minutes: 30
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_PYTHON_VERSION_WARNING: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: |
            Backend/pyproject.toml
            Backend/requirements/py312-dev-ai.constraints.txt

      - name: Install browser-test backend dependencies
        working-directory: Backend
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --require-hashes -r requirements/py312-build.lock.txt
          .venv/bin/python -m pip install -e . -c requirements/py312-dev-ai.constraints.txt
          .venv/bin/python -m pip check

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm ci

      - name: Install pinned Tectonic PDF compiler
        env:
          TECTONIC_SHA256: f3c825128095dc3399ea11c08c18035b33050a216930c295c79e8eb11bd21de4
          TECTONIC_VERSION: 0.16.9
        run: |
          archive="/tmp/tectonic-${TECTONIC_VERSION}.tar.gz"
          curl --fail --location --retry 3 --silent --show-error \
            "https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%40${TECTONIC_VERSION}/tectonic-${TECTONIC_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            --output "${archive}"
          echo "${TECTONIC_SHA256}  ${archive}" | sha256sum --check
          tar --extract --gzip --file "${archive}" --directory /tmp tectonic
          sudo install --mode 0755 /tmp/tectonic /usr/local/bin/tectonic
          tectonic --version

      - name: Install Playwright Chromium
        working-directory: Frontend
        run: npx playwright install --with-deps chromium

      - name: Run browser and accessibility tests
        working-directory: Frontend
        run: npm run test:e2e

      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: browser-test-evidence
          path: |
            Frontend/.local/playwright-report
            Frontend/.local/playwright-results
          if-no-files-found: ignore
          retention-days: 14

  deployment-config:
    name: Deployment config
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate Docker Compose config
        run: docker compose --env-file .env.production.example config --quiet

      - name: Build production containers
        run: docker compose --env-file .env.production.example build backend frontend
