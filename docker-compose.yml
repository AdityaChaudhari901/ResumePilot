name: resumepilot

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resumepilot}
      POSTGRES_USER: ${POSTGRES_USER:-resumepilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./Backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      AUTO_CREATE_DB_SCHEMA: "false"
      REQUIRE_DB_MIGRATIONS: "true"
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-resumepilot}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}@db:5432/${POSTGRES_DB:-resumepilot}
      RESUMEPILOT_DATA_DIR: /data
      AUTH_REQUIRED: "true"
      AUTH_TRUSTED_PROXY_SECRET: ${AUTH_TRUSTED_PROXY_SECRET:?Set AUTH_TRUSTED_PROXY_SECRET in .env.production}
      JOBCOPILOT_API_TOKEN: ${JOBCOPILOT_API_TOKEN:?Set JOBCOPILOT_API_TOKEN in .env.production}
      DATA_RETENTION_DAYS: ${DATA_RETENTION_DAYS:-30}
      ENABLE_JOB_BROWSER_FALLBACK: ${ENABLE_JOB_BROWSER_FALLBACK:-false}
      AGENT_WORKFLOW_MODE: ${AGENT_WORKFLOW_MODE:-deterministic_fallback}
      LLM_PROVIDER: ${LLM_PROVIDER:-vertex}
      VERTEX_PROJECT_ID: ${VERTEX_PROJECT_ID:-}
      VERTEX_REGION: ${VERTEX_REGION:-global}
      LLM_MODEL: ${LLM_MODEL:-gemini-3.5-flash}
      CREWAI_LLM_MODEL: ${CREWAI_LLM_MODEL:-}
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/ready >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - resumepilot-data:/data

  frontend:
    build:
      context: ./Frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      RESUMEPILOT_API_BASE_URL: http://backend:8000
      RESUMEPILOT_AUTH_PROVIDER: ${RESUMEPILOT_AUTH_PROVIDER:-local}
      AUTH_TRUSTED_PROXY_SECRET: ${AUTH_TRUSTED_PROXY_SECRET:?Set AUTH_TRUSTED_PROXY_SECRET in .env.production}
      DEV_USER_EXTERNAL_ID: ${DEV_USER_EXTERNAL_ID:-local-production-user}
      DEV_USER_EMAIL: ${DEV_USER_EMAIL:-}
      DEV_USER_DISPLAY_NAME: ${DEV_USER_DISPLAY_NAME:-Local Production User}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres-data:
  resumepilot-data:
